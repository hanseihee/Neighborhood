name: Sync MOLIT Rents

on:
  schedule:
    # 매일 KST 08:30 (UTC 23:30) - 매매 동기화와 30분 간격
    - cron: '30 23 * * *'
  workflow_dispatch: # 수동 실행 가능

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync recent rents
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
        run: node scripts/seed-rents.mjs 1
